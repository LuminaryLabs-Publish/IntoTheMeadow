name: Deploy IntoTheMeadow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm run editor:loop
      - run: npm run editor:browser
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: into-the-meadow-headless-editor-evidence
          path: .artifacts/headless-editor
          if-no-files-found: warn
      - run: rm -rf node_modules .artifacts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
